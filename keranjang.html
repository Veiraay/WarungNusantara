<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- ============================================================
       JUDUL TAB — ubah sesuai nama UMKM-mu
       ============================================================ -->
  <title>Keranjang Belanja | Warung Nusantara</title>

  <!-- Font sama dengan halaman utama -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>

  <!-- CSS utama (variabel warna, font, dsb diambil dari sini) -->
  <link rel="stylesheet" href="style.css">

  <style>
    /* ============================================================
       STYLE KHUSUS HALAMAN KERANJANG
       Tambahkan modifikasi tampilanmu di sini
       ============================================================ */

    /* Halaman keranjang punya padding atas agar tidak tertutup navbar */
    .halaman-keranjang {
      padding-top: 100px;           /* Ubah jika navbar-mu lebih tinggi/rendah */
      padding-bottom: 60px;
      min-height: 100vh;
      background: var(--warna-latar);
    }

    /* ── JUDUL HALAMAN ── */
    .keranjang-header {
      margin-bottom: 36px;
    }
    .keranjang-header h1 {
      font-family: var(--font-judul);
      font-size: 2rem;
      font-weight: 900;
      color: var(--warna-teks);
    }
    .keranjang-header p {
      color: #888;
      font-size: 0.95rem;
      margin-top: 4px;
    }

    /* ── LAYOUT DUA KOLOM: daftar item (kiri) + ringkasan (kanan) ──
       Ubah "2fr 1fr" untuk mengubah perbandingan lebar kolom
       Contoh: "3fr 1fr" = kolom kiri lebih lebar
    */
    .keranjang-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 28px;
      align-items: start;
    }

    /* ── DAFTAR ITEM KERANJANG ── */
    .daftar-item {
      background: white;
      border-radius: var(--radius-bulat);
      box-shadow: var(--bayangan);
      overflow: hidden;
    }

    .daftar-item-header {
      padding: 20px 24px;
      border-bottom: 2px solid var(--warna-garis);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .daftar-item-header h2 {
      font-family: var(--font-judul);
      font-size: 1.2rem;
      font-weight: 700;
    }

    /* Tombol hapus semua item */
    .btn-hapus-semua {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-isi);
      transition: opacity 0.2s;
    }
    .btn-hapus-semua:hover { opacity: 0.7; }

    /* ── SATU BARIS ITEM ── */
    .item-baris {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;           /* Ubah padding dalam setiap baris item */
      border-bottom: 1px solid var(--warna-garis);
      transition: background 0.2s;
      animation: fadeInUp 0.3s ease both;
    }
    .item-baris:last-child { border-bottom: none; }
    .item-baris:hover { background: var(--warna-latar); }

    /* Gambar produk dalam keranjang */
    .item-gambar {
      width: 80px;                  /* Ubah ukuran thumbnail gambar */
      height: 80px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--warna-latar-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      overflow: hidden;
    }
    .item-gambar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Nama & harga satuan produk */
    .item-info { flex: 1; }
    .item-nama {
      font-family: var(--font-judul);
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 4px;
    }
    .item-harga-satuan {
      font-size: 0.85rem;
      color: #999;
    }

    /* ── KONTROL JUMLAH (+ / -) ── */
    .item-qty {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--warna-latar-2);
      border-radius: 50px;
      padding: 4px 8px;
    }

    /* Tombol + dan - */
    .qty-btn {
      width: 32px; height: 32px;    /* Ubah untuk memperbesar tombol */
      border-radius: 50%;
      border: none;
      background: white;
      color: var(--warna-teks);
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: all 0.2s;
      font-family: var(--font-isi);
    }
    .qty-btn:hover {
      background: var(--warna-utama);
      color: white;
    }

    /* Angka jumlah item */
    .qty-angka {
      font-weight: 700;
      font-size: 1rem;
      min-width: 24px;
      text-align: center;
    }

    /* Total harga per item (qty × harga satuan) */
    .item-subtotal {
      font-family: var(--font-judul);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--warna-utama);
      min-width: 90px;              /* Lebar minimum agar angka tidak loncat-loncat */
      text-align: right;
    }

    /* Tombol hapus satu item (×) */
    .item-hapus {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: none;
      background: #fee;
      color: #e74c3c;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .item-hapus:hover {
      background: #e74c3c;
      color: white;
    }

    /* ── TAMBAH MENU LAGI — tombol di bawah daftar item ── */
    .tambah-menu-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px 24px;
      color: var(--warna-utama);
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      border-top: 2px dashed var(--warna-garis);    /* Garis putus-putus — ubah style jika mau */
      transition: background 0.2s;
    }
    .tambah-menu-btn:hover {
      background: var(--warna-latar-2);
    }
    .tambah-menu-btn span {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--warna-utama);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    /* ── KARTU RINGKASAN PESANAN (kanan) ── */
    .ringkasan {
      background: white;
      border-radius: var(--radius-bulat);
      box-shadow: var(--bayangan);
      padding: 28px;                /* Ubah padding dalam kartu ringkasan */
      position: sticky;             /* Tetap terlihat saat scroll daftar panjang */
      top: 100px;                   /* Ubah sesuai tinggi navbar */
    }

    .ringkasan h2 {
      font-family: var(--font-judul);
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--warna-garis);
    }

    /* Baris angka ringkasan (subtotal, ongkir, total) */
    .ringkasan-baris {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 0.95rem;
    }
    .ringkasan-baris .label { color: #777; }
    .ringkasan-baris .nilai { font-weight: 700; }

    /* Baris total akhir — lebih menonjol */
    .ringkasan-total {
      border-top: 2px solid var(--warna-garis);
      padding-top: 16px;
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ringkasan-total .label {
      font-weight: 700;
      font-size: 1rem;
    }
    .ringkasan-total .nilai {
      font-family: var(--font-judul);
      font-size: 1.4rem;            /* Ubah untuk memperbesar/perkecil angka total */
      font-weight: 900;
      color: var(--warna-utama);
    }

    /* ── OPSI PENGIRIMAN ── */
    .opsi-kirim {
      margin: 20px 0;
      padding: 16px;
      background: var(--warna-latar-2);
      border-radius: 10px;
    }
    .opsi-kirim h4 {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    /* Radio button pengiriman — tambah opsi baru dengan salin satu label */
    .opsi-kirim label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .opsi-kirim input[type="radio"] {
      accent-color: var(--warna-utama);  /* Warna radio button aktif */
      width: 16px; height: 16px;
    }
    .opsi-ongkir {
      margin-left: auto;
      font-weight: 700;
      font-size: 0.85rem;
    }

    /* Kode promo */
    .promo-wrapper {
      display: flex;
      gap: 8px;
      margin: 16px 0;
    }
    .promo-input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid var(--warna-garis);
      border-radius: 8px;
      font-family: var(--font-isi);
      font-size: 0.9rem;
      outline: none;
    }
    .promo-input:focus { border-color: var(--warna-utama); }
    .promo-btn {
      padding: 10px 16px;
      background: var(--warna-teks);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: var(--font-isi);
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .promo-btn:hover { background: var(--warna-utama); }

    /* ── TOMBOL LANJUT KE PEMBAYARAN ── */
    .btn-bayar {
      display: block;
      width: 100%;
      padding: 16px;                /* Ubah untuk memperbesar tombol */
      background: var(--warna-utama);
      color: white;
      border: none;
      border-radius: var(--radius-bulat);
      font-family: var(--font-isi);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin-top: 20px;
      transition: all 0.3s;
    }
    .btn-bayar:hover {
      background: var(--warna-sekunder);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(192,57,43,0.35);
    }
    /* Tombol dinonaktifkan saat keranjang kosong */
    .btn-bayar:disabled,
    .btn-bayar.disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ── KEAMANAN TRANSAKSI badge ── */
    .aman-badge {
      text-align: center;
      font-size: 0.78rem;
      color: #aaa;
      margin-top: 14px;
    }

    /* ── STATE KERANJANG KOSONG ── */
    .keranjang-kosong {
      text-align: center;
      padding: 60px 24px;
    }
    .keranjang-kosong .ikon-kosong {
      font-size: 5rem;
      margin-bottom: 20px;
      display: block;
    }
    .keranjang-kosong h3 {
      font-family: var(--font-judul);
      font-size: 1.5rem;
      margin-bottom: 10px;
    }
    .keranjang-kosong p {
      color: #888;
      margin-bottom: 28px;
    }

    /* ── RESPONSIF MOBILE ── */
    @media (max-width: 768px) {
      .keranjang-layout {
        grid-template-columns: 1fr;   /* Satu kolom di mobile */
      }
      .ringkasan {
        position: static;             /* Tidak sticky di mobile */
      }
      .item-baris {
        flex-wrap: wrap;
        gap: 12px;
      }
      .item-subtotal { min-width: auto; }
    }

    /* Animasi */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(40px); }
    }
    .item-keluar {
      animation: fadeOut 0.3s ease forwards;
    }
  </style>
</head>

<body>

  <!-- ============================================================
       NAVBAR — sama persis dengan index.html
       ============================================================ -->
  <nav id="navbar" class="scrolled">
    <div class="container nav-dalam">
      <a href="index.html" class="nav-logo">Warung<span>Nusantara</span></a>

      <ul class="nav-menu" id="navMenu">
        <li><a href="index.html#tentang">Tentang</a></li>
        <li><a href="index.html#produk">Produk</a></li>
        <li><a href="index.html#fitur">Keistimewaan</a></li>
        <li><a href="index.html#kontak">Kontak</a></li>
      </ul>

      <!-- Ikon keranjang dengan badge -->
      <a href="keranjang.html" class="nav-keranjang" id="navKeranjang">
        🛒
        <span class="keranjang-badge" id="keranjangBadge">0</span>
      </a>

      <button class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>


  <!-- ============================================================
       KONTEN UTAMA HALAMAN KERANJANG
       ============================================================ -->
  <main class="halaman-keranjang">
    <div class="container">

      <!-- Judul halaman -->
      <div class="keranjang-header">
        <h1>🛒 Keranjang Belanja</h1>
        <!-- Teks jumlah item diisi oleh JavaScript -->
        <p id="teks-jumlah-item">Memuat keranjang...</p>
      </div>

      <div class="keranjang-layout">

        <!-- ══════════════════════════════════════════
             KOLOM KIRI — DAFTAR ITEM KERANJANG
             ══════════════════════════════════════════ -->
        <div>

          <!-- Kartu daftar item (diisi oleh JavaScript) -->
          <div class="daftar-item" id="daftarItem">
            <!-- Konten dirender oleh renderKeranjang() di bawah -->
          </div>

          <!-- Tombol kembali ke menu utama untuk tambah lebih banyak -->
          <a href="index.html#produk" class="tambah-menu-btn">
            <span>+</span>
            Tambah Menu Lainnya
          </a>

        </div>

        <!-- ══════════════════════════════════════════
             KOLOM KANAN — RINGKASAN & PEMBAYARAN
             ══════════════════════════════════════════ -->
        <div class="ringkasan">

          <h2>📋 Ringkasan Pesanan</h2>

          <!-- Baris subtotal — angka diisi JavaScript -->
          <div class="ringkasan-baris">
            <span class="label">Subtotal</span>
            <span class="nilai" id="nilaiSubtotal">Rp 0</span>
          </div>

          <!-- ── OPSI PENGIRIMAN — tambah pilihan dengan salin <label> ──
               Ubah nilai ongkir di setiap option (data-harga)
          -->
          <div class="opsi-kirim">
            <h4>🚚 Pilih Pengiriman</h4>

            <!-- Opsi 1: Ambil sendiri (gratis) -->
            <label>
              <input type="radio" name="pengiriman" value="ambil" data-harga="0" checked onchange="hitungTotal()"/>
              Ambil Sendiri
              <span class="opsi-ongkir">Gratis</span>
            </label>

            <!-- Opsi 2: Reguler — ubah harga data-harga -->
            <label>
              <input type="radio" name="pengiriman" value="reguler" data-harga="8000" onchange="hitungTotal()"/>
              Pengiriman Reguler
              <span class="opsi-ongkir">Rp 8.000</span>
            </label>

            <!-- Opsi 3: Express — ubah harga data-harga -->
            <label>
              <input type="radio" name="pengiriman" value="express" data-harga="15000" onchange="hitungTotal()"/>
              Pengiriman Express ⚡
              <span class="opsi-ongkir">Rp 15.000</span>
            </label>

          </div>

          <!-- Baris ongkos kirim -->
          <div class="ringkasan-baris">
            <span class="label">Ongkos Kirim</span>
            <span class="nilai" id="nilaiOngkir">Rp 0</span>
          </div>

          <!-- ── KODE PROMO ──
               Tambah kode promo baru di fungsi pakaiPromo() di JavaScript
          -->
          <div class="promo-wrapper">
            <input type="text" class="promo-input" id="inputPromo" placeholder="Kode promo (HEMAT10)"/>
            <button class="promo-btn" onclick="pakaiPromo()">Pakai</button>
          </div>

          <!-- Baris diskon (tersembunyi jika tidak ada promo) -->
          <div class="ringkasan-baris" id="barisDiskon" style="display:none; color:#27AE60;">
            <span class="label" style="color:#27AE60;">🎉 Diskon Promo</span>
            <span class="nilai" id="nilaiDiskon" style="color:#27AE60;">- Rp 0</span>
          </div>

          <!-- TOTAL AKHIR -->
          <div class="ringkasan-total">
            <span class="label">Total Pembayaran</span>
            <span class="nilai" id="nilaiTotal">Rp 0</span>
          </div>

          <!-- Tombol lanjut ke pembayaran -->
          <button class="btn-bayar" id="btnBayar" onclick="lanjutBayar()">
            Lanjut ke Pembayaran →
          </button>

          <!-- Badge keamanan -->
          <p class="aman-badge">🔒 Transaksi aman & terpercaya</p>

        </div><!-- akhir .ringkasan -->

      </div><!-- akhir .keranjang-layout -->

    </div>
  </main>


  <!-- ============================================================
       JAVASCRIPT HALAMAN KERANJANG
       ============================================================ -->
  <script>

    // ============================================================
    // VARIABEL GLOBAL
    // ============================================================

    // Daftar kode promo yang valid
    // Ubah atau tambah kode & persentase diskon di sini
    const DAFTAR_PROMO = {
      'HEMAT10':  10,   // "HEMAT10" → diskon 10%
      'WARUNG20': 20,   // "WARUNG20" → diskon 20%
      'GRATIS':   100,  // contoh: diskon 100% (hanya untuk testing)
    };

    let diskonPersen = 0;   // Diskon aktif (dalam persen, 0 = tidak ada)

    // ============================================================
    // FUNGSI UTILITAS KERANJANG (localStorage)
    // ============================================================

    // Ambil data keranjang dari localStorage
    function ambilKeranjang() {
      return JSON.parse(localStorage.getItem('keranjang') || '[]');
    }

    // Simpan data keranjang ke localStorage
    function simpanKeranjang(data) {
      localStorage.setItem('keranjang', JSON.stringify(data));
    }

    // Format angka ke rupiah (contoh: 20000 → "Rp 20.000")
    function formatRupiah(angka) {
      return 'Rp ' + angka.toLocaleString('id-ID');
    }

    // Update badge di navbar
    function updateBadge() {
      const keranjang = ambilKeranjang();
      const total = keranjang.reduce(function(s, i) { return s + i.qty; }, 0);
      const badge = document.getElementById('keranjangBadge');
      if (badge) {
        badge.textContent = total;
        badge.style.display = total > 0 ? 'flex' : 'none';
      }
    }

    // ============================================================
    // RENDER DAFTAR ITEM KERANJANG
    // Fungsi ini menggambar ulang seluruh daftar setiap kali ada perubahan
    // ============================================================
    function renderKeranjang() {
      const keranjang = ambilKeranjang();
      const wrapper   = document.getElementById('daftarItem');
      const teksJml   = document.getElementById('teks-jumlah-item');

      // ── Jika keranjang kosong ── */
      if (keranjang.length === 0) {
        wrapper.innerHTML = `
          <div class="keranjang-kosong">
            <span class="ikon-kosong">🛒</span>
            <h3>Keranjangmu masih kosong</h3>
            <p>Yuk tambahkan hidangan favoritmu dari menu kami!</p>
            <a href="index.html#produk" class="btn-bayar" style="display:inline-block; width:auto; padding:14px 32px;">
              Lihat Menu 🍽️
            </a>
          </div>`;

        teksJml.textContent = 'Belum ada item dipilih';
        document.getElementById('btnBayar').classList.add('disabled');
        document.getElementById('btnBayar').disabled = true;
        hitungTotal();
        return;
      }

      // ── Ada item — bangun HTML daftar ──
      const totalItem = keranjang.reduce(function(s, i) { return s + i.qty; }, 0);
      teksJml.textContent = totalItem + ' item dipilih';
      document.getElementById('btnBayar').classList.remove('disabled');
      document.getElementById('btnBayar').disabled = false;

      // Header daftar
      let html = `
        <div class="daftar-item-header">
          <h2>🍽️ Pesananmu</h2>
          <button class="btn-hapus-semua" onclick="hapusSemua()">🗑️ Hapus Semua</button>
        </div>`;

      // Loop setiap item dan buat baris HTML
      keranjang.forEach(function(item, indeks) {

        // Tentukan konten gambar (img atau emoji fallback)
        const gambarHtml = item.gambar
          ? `<img src="${item.gambar}" alt="${item.nama}" onerror="this.parentElement.textContent='🍽️'">`
          : '🍽️';

        html += `
          <!-- ── BARIS ITEM ${indeks + 1}: ubah layout di CSS .item-baris ── -->
          <div class="item-baris" id="item-${indeks}">

            <!-- Gambar produk -->
            <div class="item-gambar">${gambarHtml}</div>

            <!-- Nama & harga satuan -->
            <div class="item-info">
              <div class="item-nama">${item.nama}</div>
              <div class="item-harga-satuan">${formatRupiah(item.harga)} / porsi</div>
            </div>

            <!-- Kontrol jumlah (+/-) -->
            <div class="item-qty">
              <!-- Tombol kurang — jika qty = 1 dan dikurangi, item akan terhapus -->
              <button class="qty-btn" onclick="ubahQty(${indeks}, -1)" title="Kurangi">−</button>
              <span class="qty-angka">${item.qty}</span>
              <!-- Tombol tambah -->
              <button class="qty-btn" onclick="ubahQty(${indeks}, +1)" title="Tambah">+</button>
            </div>

            <!-- Subtotal baris ini -->
            <div class="item-subtotal">${formatRupiah(item.harga * item.qty)}</div>

            <!-- Tombol hapus item -->
            <button class="item-hapus" onclick="hapusItem(${indeks})" title="Hapus item ini">×</button>

          </div>`;
      });

      wrapper.innerHTML = html;
      hitungTotal();
      updateBadge();
    }

    // ============================================================
    // UBAH JUMLAH (QTY) ITEM
    // delta = +1 (tambah) atau -1 (kurang)
    // ============================================================
    function ubahQty(indeks, delta) {
      const keranjang = ambilKeranjang();
      keranjang[indeks].qty += delta;

      if (keranjang[indeks].qty <= 0) {
        // Qty jadi 0 → hapus item langsung
        hapusItem(indeks);
        return;
      }

      simpanKeranjang(keranjang);
      renderKeranjang();
    }

    // ============================================================
    // HAPUS SATU ITEM
    // ============================================================
    function hapusItem(indeks) {
      // Animasi item menghilang sebelum dihapus
      const baris = document.getElementById('item-' + indeks);
      if (baris) {
        baris.classList.add('item-keluar');
        setTimeout(function() {
          const keranjang = ambilKeranjang();
          keranjang.splice(indeks, 1);
          simpanKeranjang(keranjang);
          renderKeranjang();
        }, 280);  /* Ubah angka = durasi animasi fade-out (ms) */
      } else {
        const keranjang = ambilKeranjang();
        keranjang.splice(indeks, 1);
        simpanKeranjang(keranjang);
        renderKeranjang();
      }
    }

    // ============================================================
    // HAPUS SEMUA ITEM
    // ============================================================
    function hapusSemua() {
      // Konfirmasi sebelum hapus — ubah pesan sesuai kebutuhan
      if (!confirm('Yakin ingin menghapus semua item dari keranjang?')) return;
      localStorage.removeItem('keranjang');
      diskonPersen = 0;
      renderKeranjang();
    }

    // ============================================================
    // HITUNG TOTAL PEMBAYARAN
    // Dipanggil setiap kali ada perubahan qty, opsi kirim, atau promo
    // ============================================================
    function hitungTotal() {
      const keranjang = ambilKeranjang();

      // Subtotal = jumlah (harga × qty) semua item
      const subtotal = keranjang.reduce(function(s, i) { return s + i.harga * i.qty; }, 0);

      // Ongkos kirim dari radio button yang dipilih
      const radioTerpilih = document.querySelector('input[name="pengiriman"]:checked');
      const ongkir = radioTerpilih ? parseInt(radioTerpilih.getAttribute('data-harga')) : 0;

      // Hitung diskon (dalam rupiah)
      const diskonRupiah = Math.round((subtotal * diskonPersen) / 100);

      // Total akhir
      const total = subtotal + ongkir - diskonRupiah;

      // Update tampilan angka
      document.getElementById('nilaiSubtotal').textContent = formatRupiah(subtotal);
      document.getElementById('nilaiOngkir').textContent   = ongkir === 0 ? 'Gratis' : formatRupiah(ongkir);
      document.getElementById('nilaiTotal').textContent    = formatRupiah(Math.max(0, total));

      // Tampilkan/sembunyikan baris diskon
      const barisDiskon = document.getElementById('barisDiskon');
      if (diskonPersen > 0) {
        barisDiskon.style.display = 'flex';
        document.getElementById('nilaiDiskon').textContent = '- ' + formatRupiah(diskonRupiah);
      } else {
        barisDiskon.style.display = 'none';
      }
    }

    // ============================================================
    // KODE PROMO
    // Tambah kode baru di objek DAFTAR_PROMO di atas
    // ============================================================
    function pakaiPromo() {
      const kode  = document.getElementById('inputPromo').value.trim().toUpperCase();
      const input = document.getElementById('inputPromo');

      if (!kode) {
        guncangInput(input);
        return;
      }

      if (DAFTAR_PROMO[kode] !== undefined) {
        diskonPersen = DAFTAR_PROMO[kode];
        input.style.borderColor = '#27AE60';
        input.value = '✅ ' + kode + ' (' + diskonPersen + '% off)';
        input.disabled = true;
      } else {
        // Kode salah
        diskonPersen = 0;
        input.style.borderColor = '#e74c3c';
        guncangInput(input);
        setTimeout(function() { input.style.borderColor = ''; }, 2000);
        alert('❌ Kode promo tidak valid!');
      }

      hitungTotal();
    }

    // Efek guncang jika input salah
    function guncangInput(el) {
      el.style.animation = 'none';
      el.offsetHeight; // reflow
      el.style.animation = 'guncang 0.3s ease';
    }

    // ============================================================
    // LANJUT KE PEMBAYARAN
    // Simpan data pesanan ke localStorage lalu buka pembayaran.html
    // ============================================================
    function lanjutBayar() {
      const keranjang = ambilKeranjang();
      if (keranjang.length === 0) return;

      // Ambil nilai-nilai yang akan diteruskan ke halaman pembayaran
      const radioTerpilih   = document.querySelector('input[name="pengiriman"]:checked');
      const namaKirim       = radioTerpilih ? radioTerpilih.value : 'ambil';
      const ongkir          = radioTerpilih ? parseInt(radioTerpilih.getAttribute('data-harga')) : 0;
      const subtotal        = keranjang.reduce(function(s, i) { return s + i.harga * i.qty; }, 0);
      const diskonRupiah    = Math.round((subtotal * diskonPersen) / 100);
      const total           = subtotal + ongkir - diskonRupiah;

      // Simpan ringkasan pesanan ke localStorage untuk dibaca halaman pembayaran
      const ringkasan = {
        keranjang:    keranjang,
        subtotal:     subtotal,
        ongkir:       ongkir,
        namaKirim:    namaKirim,
        diskonPersen: diskonPersen,
        diskonRupiah: diskonRupiah,
        total:        total
      };
      localStorage.setItem('pesanan', JSON.stringify(ringkasan));

      // Pindah ke halaman pembayaran
      window.location.href = 'pembayaran.html';
    }

    // ============================================================
    // INISIALISASI SAAT HALAMAN DIMUAT
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
      renderKeranjang();
      updateBadge();

      // Hamburger menu mobile
      document.getElementById('hamburger').addEventListener('click', function() {
        document.getElementById('navMenu').classList.toggle('terbuka');
      });
    });

  </script>

  <style>
    /* Animasi guncang untuk input promo salah */
    @keyframes guncang {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
  </style>

</body>
</html>
